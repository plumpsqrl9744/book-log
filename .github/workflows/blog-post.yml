name: Blog Post Sync

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정(UTC) = 한국 오전 9시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install html2text
        run: pip install html2text

      - name: Fetch RSS and sync post files
        run: |
          RSS=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "https://dev-jayden.tistory.com/rss")

          if [ -z "$RSS" ]; then
            echo "RSS fetch failed"
            exit 0
          fi

          mkdir -p log

          echo "$RSS" | python3 -c "
          import sys, os, re
          import xml.etree.ElementTree as ET
          import html2text

          h = html2text.HTML2Text()
          h.body_width = 0           # 줄바꿈 안 함
          h.protect_links = True
          h.wrap_links = False

          rss = ET.parse(sys.stdin)
          items = rss.findall('.//item')

          # RSS에 있는 글 파일명 수집 (삭제 감지용)
          current_files = set()

          for item in items:
              title = item.find('title').text or ''
              link = item.find('link').text or ''
              date = (item.find('pubDate').text or '')[:16]
              desc = item.find('description').text or ''

              # 파일명: 특수문자 제거, 공백→하이픈
              safe = re.sub(r'[^\w\s가-힣-]', '', title).strip()
              safe = re.sub(r'\s+', '-', safe)
              if not safe:
                  continue

              filepath = f'log/{safe}.md'
              current_files.add(f'{safe}.md')

              # HTML → 마크다운 변환
              content = h.handle(desc).strip()

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(f'# {title}\n\n')
                  f.write(f'> 원문: {link}\n')
                  f.write(f'> 작성일: {date}\n\n')
                  f.write(content + '\n')

              print(f'Synced: {filepath}')

          # 삭제된 글 감지: log/에 있지만 RSS에 없는 파일 제거
          if os.path.isdir('log'):
              for f in os.listdir('log'):
                  if f.endswith('.md') and f not in current_files:
                      os.remove(f'log/{f}')
                      print(f'Deleted: log/{f}')
          "

      - name: Update README with links
        run: |
          python3 -c "
          import os, re

          files = sorted(os.listdir('log')) if os.path.isdir('log') else []
          md_files = [f for f in files if f.endswith('.md')]

          links = []
          for f in md_files:
              name = f.replace('.md', '').replace('-', ' ')
              links.append(f'- [{name}](log/{f})')

          link_block = '\n'.join(links) if links else '_아직 글이 없습니다._'

          with open('README.md', 'r', encoding='utf-8') as rf:
              readme = rf.read()

          pattern = r'(<!-- POST-LIST:START -->).*?(<!-- POST-LIST:END -->)'
          updated = re.sub(pattern, rf'\1\n{link_block}\n\2', readme, flags=re.DOTALL)

          with open('README.md', 'w', encoding='utf-8') as wf:
              wf.write(updated)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "blog: 글 동기화"
          git push
