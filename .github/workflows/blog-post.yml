name: Blog Post Sync

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정(UTC) = 한국 오전 9시
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch RSS and create post files
        run: |
          RSS=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" "https://dev-jayden.tistory.com/rss")

          if [ -z "$RSS" ]; then
            echo "RSS fetch failed"
            exit 0
          fi

          mkdir -p posts

          echo "$RSS" | python3 -c "
          import sys, os, re, html
          import xml.etree.ElementTree as ET

          rss = ET.parse(sys.stdin)
          items = rss.findall('.//item')

          for item in items:
              title = item.find('title').text or ''
              link = item.find('link').text or ''
              date = (item.find('pubDate').text or '')[:16]
              desc = item.find('description').text or ''

              # 파일명: 특수문자 제거, 공백→하이픈
              safe = re.sub(r'[^\w\s가-힣-]', '', title).strip()
              safe = re.sub(r'\s+', '-', safe)
              if not safe:
                  continue

              filepath = f'posts/{safe}.md'
              if os.path.exists(filepath):
                  continue

              # HTML 태그 제거, 엔티티 디코드
              content = re.sub(r'<[^>]+>', '', desc)
              content = html.unescape(content).strip()

              with open(filepath, 'w', encoding='utf-8') as f:
                  f.write(f'# {title}\n\n')
                  f.write(f'> 원문: {link}\n')
                  f.write(f'> 작성일: {date}\n\n')
                  f.write(content + '\n')

              print(f'Created: {filepath}')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No new posts" && exit 0
          git commit -m "blog: 새 글 동기화"
          git push
